<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Eyeball LLM</title>
<link rel="stylesheet" href="viewer.css">
<link rel="stylesheet" href="dataloader.css">
</head>
<body>

<header id="shell" data-page="dataloader"></header>

<div class="lv-card" id="dl-root">
  <div class="lv-head">
    <div class="lv-title-block">
      <h3 class="lv-title" id="dl-title">Loading...</h3>
    </div>
    <div class="lv-toolbar">
      <select id="dl-row-select" title="Select row"></select>
    </div>
  </div>

  <p class="lv-info" id="dl-info"></p>

  <div class="lv-legend" aria-label="legend">
    <span class="lv-leg-item"><span class="dl-leg-sw dl-doc-0"></span>doc 0 / 2 / 4 …</span>
    <span class="lv-leg-item"><span class="dl-leg-sw dl-doc-1"></span>doc 1 / 3 / 5 …</span>
    <span class="lv-leg-item"><span class="dl-leg-sw dl-leg-bos"></span>BOS opens new doc</span>
    <span class="lv-leg-item"><span class="lv-leg-sw lv-leg-special"></span>special token</span>
    <span class="lv-leg-item dl-leg-noinfo">target = −1 ⟶ <code>(no target)</code></span>
  </div>

  <div class="dl-pages" id="dl-pages"></div>
  <div id="dl-error"></div>
</div>

<div class="lv-tip" id="dl-tip"></div>

<script src="shell.js"></script>
<script src="dataloader.js"></script>
</body>
</html>
