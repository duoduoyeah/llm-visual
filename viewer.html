<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>llm-visual viewer</title>
<style>
  :root {
    --bg: #1a1a1a;
    --card: #1a1a1a;
    --card-border: #2e2e2e;
    --text: #e6e6e6;
    --text-dim: #8a8a8a;
    --text-muted: #c9c9c9;
    --btn-border: #3a3a3a;
    --btn-hover: #2a2a2a;

    /* token palette */
    --tok-prompt:  #d4d4d4;          /* light white grey */
    --tok-current: #ffd84d;          /* brighter golden for the new token */
    --slider-thumb: #dc641e;
  }
  body {
    background: #0e0e0e;
    color: var(--text);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 24px;
  }
  .lv-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 22px 26px 18px;
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.35);
    max-width: 960px;
    margin: 0 auto;
  }
  .lv-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 4px;
  }
  .lv-title-block { min-width: 0; flex: 1; }
  .lv-title {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 600;
    color: #f2f2f2;
  }
  .lv-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  select, button.lv-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--btn-border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    font-family: inherit;
  }
  select:hover, button.lv-btn:hover { background: var(--btn-hover); border-color: #555; }
  select { padding-right: 22px; }

  .lv-prompt {
    margin: 14px 0 0;
    padding: 18px 20px;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 1rem;
    line-height: 1.75;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 44px;
  }
  .lv-prompt:empty::before {
    content: "(empty)";
    color: var(--text-dim);
  }

  .lv-tok          { transition: color 0.12s; }
  .lv-tok-prompt   { color: var(--tok-prompt); }
  .lv-tok-special  { color: var(--text-dim); font-style: italic; }
  .lv-tok-just {
    color: var(--tok-current);
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-underline-offset: 3px;
  }
  .lv-tok-forced::after {
    content: "•";
    color: #ffd23f;
    margin: 0 0 0 1px;
    font-size: 0.85em;
    vertical-align: super;
  }

  .lv-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
  }
  .lv-controls input[type=range] {
    flex: 1;
    accent-color: var(--slider-thumb);
  }
  .lv-step {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
    min-width: 80px;
    text-align: right;
  }

  .lv-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 18px;
    margin-top: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.74rem;
    color: var(--text-muted);
    align-items: center;
  }
  .lv-leg-item { display: inline-flex; align-items: center; gap: 6px; }
  .lv-leg-sw {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .lv-leg-ramp { display: inline-flex; align-items: center; gap: 6px; }
  .lv-leg-ramp-bar {
    display: inline-block;
    width: 70px; height: 10px;
    border-radius: 2px;
    background: linear-gradient(to right, rgb(255,232,153), rgb(212,90,20));
  }
  .lv-leg-current {
    color: var(--tok-current);
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-underline-offset: 2px;
  }
  .lv-leg-special { background: var(--text-dim); }
  .lv-leg-forced::before {
    content: "•";
    color: #ffd23f;
    font-size: 1.1em;
    margin-right: 2px;
  }

  .lv-tip {
    position: fixed;
    pointer-events: none;
    background: rgba(20,20,20,0.96);
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 0.78rem;
    line-height: 1.45;
    color: var(--text);
    z-index: 10;
    display: none;
    max-width: 280px;
  }
  .lv-tip .k { color: var(--text-dim); }
  .lv-tip .v { color: #fff; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .lv-tip .special { color: #ffd23f; font-style: italic; }

  .lv-error {
    color: #ff6b6b;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.82rem;
    padding: 12px;
    background: rgba(255, 107, 107, 0.08);
    border-radius: 6px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="lv-card" id="lv-root">
  <div class="lv-head">
    <div class="lv-title-block">
      <h3 class="lv-title" id="lv-title">Loading...</h3>
    </div>
    <div class="lv-toolbar">
      <select id="lv-trace-select" title="Select trace"></select>
      <button class="lv-btn" id="lv-play">▶ Play</button>
      <button class="lv-btn" id="lv-export">Export PNG</button>
    </div>
  </div>

  <p class="lv-prompt" id="lv-prompt"></p>

  <div class="lv-controls">
    <input type="range" id="lv-slider" min="0" max="0" value="0" step="1">
    <span class="lv-step" id="lv-step-label">step 0 / 0</span>
  </div>

  <div class="lv-legend" aria-label="legend">
    <span class="lv-leg-item"><span class="lv-leg-sw" style="background:var(--tok-prompt)"></span>prompt</span>
    <span class="lv-leg-ramp">
      step 1
      <span class="lv-leg-ramp-bar"></span>
      last
    </span>
    <span class="lv-leg-item"><span class="lv-leg-current">just generated</span></span>
    <span class="lv-leg-item"><span class="lv-leg-sw lv-leg-special"></span>special token</span>
    <span class="lv-leg-item lv-leg-forced">forced (tool / injected)</span>
  </div>
  <div id="lv-error"></div>
</div>

<div class="lv-tip" id="lv-tip"></div>

<script>
(function () {
  'use strict';

  // ------------------------------------------------------------
  // Config
  // ------------------------------------------------------------
  const CFG = {
    promptColor: '#d4d4d4',          // light white grey
    currentColor: '#ffd84d',         // brighter golden for the just-generated token
    rampStart: [255, 232, 153],      // generated ramp: light yellow
    rampEnd:   [212,  90,  20],      //                  deep orange
    animMs: 8000,                    // total play duration cap
    minStepsPerSec: 4,
  };

  // ------------------------------------------------------------
  // DOM refs
  // ------------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const titleEl = $('lv-title');
  const promptEl = $('lv-prompt');
  const selEl = $('lv-trace-select');
  const playBtn = $('lv-play');
  const exportBtn = $('lv-export');
  const sliderEl = $('lv-slider');
  const stepLabel = $('lv-step-label');
  const errorEl = $('lv-error');
  const tipEl = $('lv-tip');

  // ------------------------------------------------------------
  // State
  // ------------------------------------------------------------
  let DOC = null;
  let TRACE = null;
  let LAYOUT = null;
  let currentStep = 0;
  let playing = false;
  let playTimer = null;

  // ------------------------------------------------------------
  // Utilities
  // ------------------------------------------------------------
  function showError(msg) {
    errorEl.className = 'lv-error';
    errorEl.textContent = msg;
  }
  function clearError() {
    errorEl.className = '';
    errorEl.textContent = '';
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  async function loadFromUrl(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch ' + url + ': ' + res.status);
    return await res.json();
  }

  function isSpecial(vocabId) {
    if (!DOC || !DOC.vocab_meta) return false;
    const m = DOC.vocab_meta[String(vocabId)];
    return !!(m && m.is_special);
  }

  // ------------------------------------------------------------
  // Layout: walk tokens in (gen_step, declaration order) and build
  // the visible sequence after every step.
  // ------------------------------------------------------------
  function computeLayout(trace) {
    const tokensById = Object.create(null);
    for (const t of trace.tokens) tokensById[t.id] = t;

    const byStep = new Map();
    let maxStep = 0;
    for (const t of trace.tokens) {
      if (!byStep.has(t.gen_step)) byStep.set(t.gen_step, []);
      byStep.get(t.gen_step).push(t);
      if (t.gen_step > maxStep) maxStep = t.gen_step;
    }

    const sequences = [];
    let cur = [];

    for (let step = 0; step <= maxStep; step++) {
      const newOnes = byStep.get(step) || [];
      const abs = newOnes.filter((t) => 'abs' in t.position);
      const bet = newOnes.filter((t) => 'between' in t.position);

      const seen = new Map();
      for (const t of bet) {
        const k = t.position.between.join('|');
        if (seen.has(k)) {
          throw new Error('step ' + step + ': multiple tokens claim position [' +
            t.position.between.join(',') + ']: ' + seen.get(k) + ', ' + t.id);
        }
        seen.set(k, t.id);
      }

      abs.sort((a, b) => a.position.abs - b.position.abs);
      for (const t of abs) {
        const idx = t.position.abs;
        if (idx < 0 || idx > cur.length) {
          throw new Error('step ' + step + ': token ' + t.id + ' abs=' + idx +
            ' out of range [0, ' + cur.length + ']');
        }
        cur.splice(idx, 0, t.id);
      }

      for (const t of bet) {
        const [aId, bId] = t.position.between;
        const ai = cur.indexOf(aId);
        const bi = cur.indexOf(bId);
        if (ai === -1 || bi === -1) {
          throw new Error('step ' + step + ': token ' + t.id + ' anchors [' +
            aId + ',' + bId + '] not in current sequence');
        }
        if (bi !== ai + 1) {
          throw new Error('step ' + step + ': token ' + t.id + ' anchors [' +
            aId + ',' + bId + '] not adjacent (positions ' + ai + ',' + bi + ')');
        }
        if (tokensById[aId].gen_step >= step || tokensById[bId].gen_step >= step) {
          throw new Error('step ' + step + ': token ' + t.id +
            ' anchors must come from strictly earlier steps');
        }
        cur.splice(ai + 1, 0, t.id);
      }

      sequences.push(cur.slice());
    }

    let maxLen = 0;
    for (const s of sequences) if (s.length > maxLen) maxLen = s.length;

    return { sequences, maxStep, maxLen, tokensById };
  }

  // ------------------------------------------------------------
  // Color: yellow → orange ramp by gen_step
  // ------------------------------------------------------------
  function rgbStr(arr) { return `rgb(${arr[0]},${arr[1]},${arr[2]})`; }
  function rampColor(step, maxStep) {
    if (step <= 0) return CFG.promptColor;
    if (maxStep <= 1) return rgbStr(CFG.rampEnd);
    const t = (step - 1) / (maxStep - 1);
    const r = Math.round(CFG.rampStart[0] + (CFG.rampEnd[0] - CFG.rampStart[0]) * t);
    const g = Math.round(CFG.rampStart[1] + (CFG.rampEnd[1] - CFG.rampStart[1]) * t);
    const b = Math.round(CFG.rampStart[2] + (CFG.rampEnd[2] - CFG.rampStart[2]) * t);
    return `rgb(${r},${g},${b})`;
  }

  // ------------------------------------------------------------
  // Render colored sequence text for a given step.
  // Tokens with gen_step > currentStep are hidden (no preview).
  // ------------------------------------------------------------
  function renderSequenceText(step) {
    if (!LAYOUT) return '';
    const seq = LAYOUT.sequences[step] || [];
    const parts = [];
    for (let i = 0; i < seq.length; i++) {
      const id = seq[i];
      const t = LAYOUT.tokensById[id];
      const text = DOC.vocab[String(t.vocab_id)] ?? '';
      const cls = ['lv-tok'];
      let inlineColor = '';
      const isJust = t.gen_step > 0 && t.gen_step === step;
      if (t.gen_step === 0) {
        cls.push('lv-tok-prompt');
      } else if (isJust) {
        cls.push('lv-tok-just');
      } else {
        inlineColor = ' style="color:' + rampColor(t.gen_step, LAYOUT.maxStep) + '"';
      }
      if (isSpecial(t.vocab_id)) cls.push('lv-tok-special');
      if (t.forced) cls.push('lv-tok-forced');
      parts.push(
        '<span class="' + cls.join(' ') + '"' + inlineColor +
        ' data-id="' + escapeHtml(t.id) + '"' +
        ' data-vid="' + t.vocab_id + '"' +
        ' data-step="' + t.gen_step + '"' +
        ' data-col="' + i + '"' +
        (t.forced ? ' data-forced="1"' : '') +
        '>' + escapeHtml(text) + '</span>'
      );
    }
    return parts.join('');
  }

  // ------------------------------------------------------------
  // Hover tooltip (token spans)
  // ------------------------------------------------------------
  promptEl.addEventListener('mousemove', (ev) => {
    const span = ev.target && ev.target.closest && ev.target.closest('span.lv-tok');
    if (!span) { tipEl.style.display = 'none'; return; }
    const vid = span.dataset.vid;
    const text = DOC.vocab[String(vid)] ?? '?';
    const special = isSpecial(parseInt(vid, 10));
    tipEl.innerHTML =
      '<div><span class="k">token: </span><span class="v ' + (special ? 'special' : '') + '">' +
        escapeHtml(JSON.stringify(text)) + '</span></div>' +
      '<div><span class="k">vocab_id: </span><span class="v">' + escapeHtml(vid) + '</span></div>' +
      '<div><span class="k">id: </span><span class="v">' + escapeHtml(span.dataset.id) + '</span></div>' +
      '<div><span class="k">gen_step: </span><span class="v">' + escapeHtml(span.dataset.step) + '</span></div>' +
      '<div><span class="k">col: </span><span class="v">' + escapeHtml(span.dataset.col) + '</span></div>' +
      (span.dataset.forced === '1' ? '<div><span class="k">forced: </span><span class="v">true</span></div>' : '');
    tipEl.style.display = 'block';
    tipEl.style.left = (ev.clientX + 14) + 'px';
    tipEl.style.top  = (ev.clientY + 14) + 'px';
  });
  promptEl.addEventListener('mouseleave', () => { tipEl.style.display = 'none'; });

  // ------------------------------------------------------------
  // Playback / step control
  // ------------------------------------------------------------
  function stepsPerSecForLayout() {
    if (!LAYOUT) return CFG.minStepsPerSec;
    const total = LAYOUT.maxStep + 1;
    const fromCap = total / (CFG.animMs / 1000);
    return Math.max(CFG.minStepsPerSec, fromCap);
  }

  function setStep(s) {
    if (!LAYOUT) return;
    currentStep = Math.max(0, Math.min(s, LAYOUT.maxStep));
    sliderEl.value = String(currentStep);
    stepLabel.textContent = 'step ' + currentStep + ' / ' + LAYOUT.maxStep;
    promptEl.innerHTML = renderSequenceText(currentStep);
  }

  function play() {
    if (!LAYOUT) return;
    if (currentStep >= LAYOUT.maxStep) currentStep = 0;
    playing = true;
    playBtn.textContent = '❚❚ Pause';
    const interval = 1000 / stepsPerSecForLayout();
    playTimer = setInterval(() => {
      if (currentStep >= LAYOUT.maxStep) { stop(); return; }
      setStep(currentStep + 1);
    }, interval);
  }
  function stop() {
    playing = false;
    playBtn.textContent = '▶ Play';
    if (playTimer) { clearInterval(playTimer); playTimer = null; }
  }
  playBtn.addEventListener('click', () => playing ? stop() : play());

  sliderEl.addEventListener('input', () => {
    stop();
    setStep(Number(sliderEl.value));
  });

  // ------------------------------------------------------------
  // PNG export (text-only)
  // Renders: title + final colored sequence + legend.
  // ------------------------------------------------------------
  exportBtn.addEventListener('click', () => {
    const url = composeStaticImage();
    if (!url) return;
    const link = document.createElement('a');
    const safe = (TRACE && TRACE.name ? TRACE.name : 'trace').replace(/[^a-z0-9-_]+/gi, '_');
    link.download = safe + '.png';
    link.href = url;
    link.click();
  });

  function composeStaticImage() {
    if (!LAYOUT) return null;
    const { sequences, maxStep, tokensById } = LAYOUT;

    const PAD = 22;
    const TITLE_FONT = '600 14px ui-sans-serif, -apple-system, system-ui, sans-serif';
    const TEXT_FONT = '14px ui-monospace, SFMono-Regular, Menlo, monospace';
    const SMALL_FONT = '11px ui-monospace, SFMono-Regular, Menlo, monospace';
    const TITLE_H = 24;
    const LINE_H = 22;
    const GAP = 14;
    const LEG_H = 22;
    const TARGET_W = 960;
    const innerW = TARGET_W - 2 * PAD;
    const totalW = TARGET_W;

    // measure
    const tmp = document.createElement('canvas').getContext('2d');
    tmp.font = TEXT_FONT;
    const finalSeq = sequences[maxStep] || [];
    const spans = finalSeq.map((id) => {
      const t = tokensById[id];
      return {
        text: DOC.vocab[String(t.vocab_id)] ?? '',
        gen_step: t.gen_step,
        special: isSpecial(t.vocab_id),
        forced: !!t.forced,
        isJust: t.gen_step > 0 && t.gen_step === maxStep,
      };
    });
    const lines = wrapSpansIntoLines(tmp, spans, innerW);
    const seqH = lines.length * LINE_H;

    let anySpecial = false, anyForced = false;
    for (const t of TRACE.tokens) {
      if (isSpecial(t.vocab_id)) anySpecial = true;
      if (t.forced) anyForced = true;
    }

    const totalH = PAD + TITLE_H + GAP + seqH + GAP + LEG_H + PAD;

    const dpr = window.devicePixelRatio || 1;
    const c = document.createElement('canvas');
    c.width = totalW * dpr;
    c.height = totalH * dpr;
    const cx = c.getContext('2d');
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);

    cx.fillStyle = '#1a1a1a';
    cx.fillRect(0, 0, totalW, totalH);

    let y = PAD;

    cx.font = TITLE_FONT;
    cx.fillStyle = '#f2f2f2';
    cx.textBaseline = 'top';
    cx.fillText(TRACE.name || 'trace', PAD, y);

    // total-steps badge on the right edge of the title row
    cx.font = SMALL_FONT;
    cx.fillStyle = '#c9c9c9';
    const stepsLabel = 'steps: ' + maxStep + ' (snapshot at step ' + maxStep + ')';
    const stepsW = cx.measureText(stepsLabel).width;
    cx.fillText(stepsLabel, totalW - PAD - stepsW, y + 4);

    y += TITLE_H + GAP;

    drawSeqLines(cx, PAD, y, lines, LINE_H, TEXT_FONT);
    y += seqH + GAP;

    drawStaticLegend(cx, PAD, y, SMALL_FONT, anySpecial, anyForced);

    return c.toDataURL('image/png');
  }

  function wrapSpansIntoLines(tctx, spans, maxW) {
    tctx.font = '14px ui-monospace, SFMono-Regular, Menlo, monospace';
    const lines = [[]];
    let curW = 0;
    for (const sp of spans) {
      const segments = sp.text.split('\n');
      for (let i = 0; i < segments.length; i++) {
        if (i > 0) { lines.push([]); curW = 0; }
        const seg = segments[i];
        if (seg.length === 0) continue;
        const w = tctx.measureText(seg).width;
        if (curW > 0 && curW + w > maxW) { lines.push([]); curW = 0; }
        lines[lines.length - 1].push({
          text: seg, w,
          gen_step: sp.gen_step,
          special: sp.special,
          forced: sp.forced,
          isJust: sp.isJust,
        });
        curW += w;
      }
    }
    return lines;
  }

  function drawSeqLines(cx, x0, y0, lines, lineH, font) {
    cx.font = font;
    cx.textBaseline = 'top';
    for (let li = 0; li < lines.length; li++) {
      let x = x0;
      const y = y0 + li * lineH;
      for (const sp of lines[li]) {
        let color;
        if (sp.special) color = '#8a8a8a';
        else if (sp.gen_step === 0) color = CFG.promptColor;
        else if (sp.isJust) color = CFG.currentColor;
        else color = rampColor(sp.gen_step, LAYOUT.maxStep);

        cx.fillStyle = color;
        cx.fillText(sp.text, x, y);

        // underline for the just-generated token
        if (sp.isJust) {
          cx.fillRect(x, y + lineH - 4, sp.w, 2);
        }
        // forced marker (small dot above the trailing edge)
        if (sp.forced) {
          cx.fillStyle = '#ffd23f';
          cx.beginPath();
          cx.arc(x + sp.w + 2, y + 3, 2, 0, Math.PI * 2);
          cx.fill();
        }
        x += sp.w;
      }
    }
  }

  function drawStaticLegend(cx, x0, y0, font, anySpecial, anyForced) {
    cx.font = font;
    cx.textBaseline = 'middle';
    const SW = 12;
    const RAMP_W = 70;
    const PAD_TXT = 6;
    const GAP_ITEM = 16;
    let x = x0;
    const yMid = y0 + 11;

    const drawSwatch = (color, label) => {
      cx.fillStyle = color;
      cx.fillRect(x, yMid - SW / 2, SW, SW);
      x += SW + PAD_TXT;
      cx.fillStyle = '#c9c9c9';
      cx.fillText(label, x, yMid);
      x += cx.measureText(label).width + GAP_ITEM;
    };

    drawSwatch(CFG.promptColor, 'prompt');

    if (LAYOUT.maxStep > 0) {
      const grad = cx.createLinearGradient(x, 0, x + RAMP_W, 0);
      grad.addColorStop(0, rgbStr(CFG.rampStart));
      grad.addColorStop(1, rgbStr(CFG.rampEnd));
      cx.fillStyle = grad;
      cx.fillRect(x, yMid - SW / 2, RAMP_W, SW);
      x += RAMP_W + PAD_TXT;
      cx.fillStyle = '#c9c9c9';
      cx.fillText('step 1 → last', x, yMid);
      x += cx.measureText('step 1 → last').width + GAP_ITEM;
    }

    // current-step swatch: text "abc" with color + underline
    cx.fillStyle = CFG.currentColor;
    const cLabel = 'just generated';
    cx.fillText(cLabel, x, yMid);
    const cw = cx.measureText(cLabel).width;
    cx.fillRect(x, yMid + 7, cw, 1.5);
    x += cw + GAP_ITEM;

    if (anySpecial) drawSwatch('#8a8a8a', 'special token');
    if (anyForced) {
      cx.fillStyle = '#ffd23f';
      cx.beginPath();
      cx.arc(x + 4, yMid, 3, 0, Math.PI * 2);
      cx.fill();
      x += 12;
      cx.fillStyle = '#c9c9c9';
      cx.fillText('forced (tool / injected)', x, yMid);
    }
  }

  // ------------------------------------------------------------
  // Trace selection
  // ------------------------------------------------------------
  function loadDoc(doc) {
    DOC = doc;
    if (!doc.schema_version) { showError('missing schema_version'); return; }
    if (doc.schema_version !== '1') {
      showError('unsupported schema_version: ' + doc.schema_version + ' (expected "1")'); return;
    }
    if (!Array.isArray(doc.traces) || doc.traces.length === 0) {
      showError('no traces in document'); return;
    }
    selEl.innerHTML = '';
    doc.traces.forEach((tr, i) => {
      const opt = document.createElement('option');
      opt.value = String(i);
      const promptPreview = (tr.prompt_text || '').slice(0, 40).replace(/\s+/g, ' ');
      opt.textContent = (tr.name || ('trace ' + i)) + (promptPreview ? '  —  ' + promptPreview : '');
      selEl.appendChild(opt);
    });
    selEl.value = '0';
    selectTrace(0);
  }

  function selectTrace(i) {
    stop();
    TRACE = DOC.traces[i];
    titleEl.textContent = TRACE.name || ('trace ' + i);
    try {
      LAYOUT = computeLayout(TRACE);
      clearError();
    } catch (e) {
      LAYOUT = null;
      showError(String(e.message || e));
      promptEl.innerHTML = '';
      sliderEl.max = '0';
      stepLabel.textContent = 'step 0 / 0';
      return;
    }
    sliderEl.max = String(LAYOUT.maxStep);
    setStep(0);
  }

  selEl.addEventListener('change', () => selectTrace(Number(selEl.value)));

  // ------------------------------------------------------------
  // Boot
  // ------------------------------------------------------------
  const params = new URLSearchParams(location.search);
  const traceUrl = params.get('trace') || './examples/hello-world.json';
  loadFromUrl(traceUrl)
    .then(loadDoc)
    .catch((e) => {
      titleEl.textContent = 'failed to load';
      showError('could not load ' + traceUrl + ': ' + (e.message || e));
    });
})();
</script>
</body>
</html>
